{% extends "base.html" %}
<!-- Load the crispy tags right under the extends tag -->
{% load crispy_forms_tags %} 

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-lg">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0 fw-bold">Create an Account</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- This replaces form.as_p and styles everything automatically -->
                    {{ form|crispy }}
                    
                    <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-bold">Sign Up</button>
                </form>
            </div>
            <div class="card-footer text-center py-3 bg-light">
                <small class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-bold">Log in here</a>.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
