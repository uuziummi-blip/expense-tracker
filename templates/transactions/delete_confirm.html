{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow p-5">
            <h1 class="text-danger mb-4">⚠️</h1>
            <h3 class="fw-bold">Are you absolutely sure?</h3>
            <p class="text-muted mt-3">
                You are about to delete the transaction: <strong>"{{ transaction.category.name }} - Rs {{ transaction.amount }}"</strong>. 
                This action cannot be undone.
            </p>
            
            <form method="POST" class="mt-4">
                {% csrf_token %}
                <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
                <button type="submit" class="btn btn-danger">Yes, Delete It</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
